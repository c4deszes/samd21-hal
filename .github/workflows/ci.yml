name: Build

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/c4deszes/arm-gcc-docker:v1.4.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: cmake --workflow --preset workflow-build

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/c4deszes/arm-gcc-docker:v1.4.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Doxygen
        run: apt-get install -y doxygen

      - name: Generate Documentation
        run: cmake --workflow --preset workflow-docs
